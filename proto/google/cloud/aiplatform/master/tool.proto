syntax = "proto3";
package google.cloud.aiplatform.master;
option go_package = "github.com/router-for-me/CLIProxyAPI/v6/internal/proto/aiplatform";

import "google/protobuf/struct.proto";

message FunctionDeclaration {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;
  google.protobuf.Struct response = 4;
}

message FunctionCall {
  string name = 1;
  google.protobuf.Struct args = 2;
}

message FunctionResponse {
  string name = 1;
  google.protobuf.Struct response = 2;
}

message GenerateContentRequest {
  string model = 1;
  repeated Content contents = 2;
  Content system_instruction = 6;
  repeated Tool tools = 5;
  ToolConfig tool_config = 7;
  GenerationConfig generation_config = 4;
  repeated SafetySetting safety_settings = 3;
}

message GenerateContentResponse {
  repeated Candidate candidates = 1;
  UsageMetadata usage_metadata = 2;
  string model_version = 3;
}

message Content {
  string role = 1;
  repeated Part parts = 2;
}

message Part {
  oneof data {
    string text = 1;
    FunctionCall function_call = 3;
    FunctionResponse function_response = 4;
    Blob inline_data = 2;
  }
  optional bool thought = 10;
}

message Blob {
  string mime_type = 1;
  bytes data = 2;
}

message Candidate {
  Content content = 1;
  string finish_reason = 2;
}

message UsageMetadata {
  int32 prompt_token_count = 1;
  int32 candidates_token_count = 2;
  int32 total_token_count = 3;
}

message Tool {
  repeated FunctionDeclaration function_declarations = 1;
}

message ToolConfig {
  FunctionCallingConfig function_calling_config = 1;
}

message FunctionCallingConfig {
  string mode = 1;
}

message GenerationConfig {
  optional float temperature = 1;
  optional float top_p = 2;
  optional int32 top_k = 3;
  optional int32 max_output_tokens = 5;
  repeated string stop_sequences = 6;
}

message SafetySetting {
  string category = 1;
  string threshold = 2;
}

message CountTokensRequest {
  string model = 1;
  repeated Content contents = 2;
}

message CountTokensResponse {
  int32 total_tokens = 1;
}
