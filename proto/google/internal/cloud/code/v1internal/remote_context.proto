syntax = "proto3";
package google.internal.cloud.code.v1internal;
option go_package = "github.com/router-for-me/CLIProxyAPI/v6/internal/proto/v1internal";

message RemoteContext {
  enum RagState {
    RAG_STATE_UNSPECIFIED = 0;
    RAG_DISABLED = 1;
    RAG_FOUND = 2;
    RAG_NOT_FOUND = 3;
    RAG_ERROR = 4;
  }

  google.internal.cloud.code.v1internal.RemoteContext.RagState rag_state = 1;
  repeated google.internal.cloud.code.v1internal.RemoteSnippet remote_snippets = 2;
}

message RemoteSnippet {
  enum SnippetType {
    UNKNOWN = 0;
    CODE = 1;
    SUMMARY = 2;
  }

  google.internal.cloud.code.v1internal.RemoteSnippet.SnippetType type = 1;
  string content = 2;
  string file_url = 3;
  string file_path = 4;
  string repo_url = 5;
}
